{% extends 'agenda/base.html' %}

{% block title %}Confirmar Eliminación{% endblock %}

{% block content %}
  <h2>¿Estás seguro?</h2>
  <p>Estás a punto de eliminar la tarea: <strong>"{{ task.title }}"</strong></p>
  <p>Esta acción no se puede deshacer.</p>

  <form method="POST">
    
    {% csrf_token %}
    
    <button type="submit" class="btn-delete">Sí, eliminar</button>
    <a href="{% url 'agenda:task_list' %}" class="btn">Cancelar</a>
  </form>

{% endblock %}
